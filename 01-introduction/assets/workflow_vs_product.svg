<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a2e">Workflow vs. Product</text>

  <!-- Workflow Column (Left) -->
  <rect x="40" y="60" width="340" height="340" rx="12" fill="#fef3f2" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="92" text-anchor="middle" font-size="15" font-weight="600" fill="#b91c1c">WORKFLOW</text>
  <text x="210" y="112" text-anchor="middle" font-size="11" fill="#92400e" font-style="italic">Personal, ephemeral — do NOT embed in code</text>

  <!-- Workflow items -->
  <rect x="65" y="135" width="290" height="42" rx="6" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="80" y="155" font-size="13" fill="#1e293b">Your text editor / IDE preferences</text>
  <text x="80" y="170" font-size="10" fill="#64748b">RStudio layout, font size, color theme</text>

  <rect x="65" y="190" width="290" height="42" rx="6" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="80" y="210" font-size="13" fill="#1e293b">Where you store projects on disk</text>
  <text x="80" y="225" font-size="10" fill="#64748b">/Users/matt/Dropbox/projects/...</text>

  <rect x="65" y="245" width="290" height="42" rx="6" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="80" y="265" font-size="13" fill="#1e293b">Keyboard shortcuts you use</text>
  <text x="80" y="280" font-size="10" fill="#64748b">Ctrl+Shift+M, Cmd+Enter, etc.</text>

  <rect x="65" y="300" width="290" height="42" rx="6" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="80" y="320" font-size="13" fill="#1e293b">Your operating system</text>
  <text x="80" y="335" font-size="10" fill="#64748b">macOS, Windows, Linux</text>

  <rect x="65" y="355" width="290" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="210" y="375" text-anchor="middle" font-size="11" fill="#b91c1c" font-weight="500">setwd(), rm(list = ls())</text>

  <!-- Product Column (Right) -->
  <rect x="420" y="60" width="340" height="340" rx="12" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="92" text-anchor="middle" font-size="15" font-weight="600" fill="#15803d">PRODUCT</text>
  <text x="590" y="112" text-anchor="middle" font-size="11" fill="#166534" font-style="italic">Shared, persistent — must be self-contained</text>

  <!-- Product items -->
  <rect x="445" y="135" width="290" height="42" rx="6" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="460" y="155" font-size="13" fill="#1e293b">R scripts (code/)</text>
  <text x="460" y="170" font-size="10" fill="#64748b">01_ingest.R, 02_clean.R, utils.R</text>

  <rect x="445" y="190" width="290" height="42" rx="6" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="460" y="210" font-size="13" fill="#1e293b">Data files (data/, data_raw/)</text>
  <text x="460" y="225" font-size="10" fill="#64748b">.csv, .RDS, .parquet</text>

  <rect x="445" y="245" width="290" height="42" rx="6" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="460" y="265" font-size="13" fill="#1e293b">Documentation (README.md)</text>
  <text x="460" y="280" font-size="10" fill="#64748b">What, how, where, who</text>

  <rect x="445" y="300" width="290" height="42" rx="6" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="460" y="320" font-size="13" fill="#1e293b">Environment (renv.lock)</text>
  <text x="460" y="335" font-size="10" fill="#64748b">Package versions, R version</text>

  <rect x="445" y="355" width="290" height="30" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="590" y="375" text-anchor="middle" font-size="11" fill="#15803d" font-weight="500">here::here(), .Rproj</text>

  <!-- Divider arrow -->
  <line x1="400" y1="180" x2="400" y2="320" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="165" text-anchor="middle" font-size="20" fill="#ef4444">&#x2718;</text>
  <text x="400" y="355" text-anchor="middle" font-size="10" fill="#64748b">keep separate</text>
</svg>
