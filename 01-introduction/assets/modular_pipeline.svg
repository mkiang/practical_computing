<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" font-family="'Menlo', 'Consolas', monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <style>
      .script { fill: #e8f0fe; stroke: #2d4a7a; stroke-width: 1.5; rx: 6; }
      .datafile { fill: #fef3e0; stroke: #b07020; stroke-width: 1.5; rx: 6; }
      .label-script { fill: #1a3055; font-weight: bold; font-size: 11px; }
      .label-data { fill: #6d4210; font-size: 11px; }
      .connector { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .checkpoint { fill: #2e7d32; font-size: 10px; font-style: italic; }
      .heading { font-family: 'Helvetica Neue', 'Arial', sans-serif; font-size: 11px; fill: #888; text-transform: uppercase; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- Column headers -->
  <text x="170" y="24" text-anchor="middle" class="heading">Scripts</text>
  <text x="500" y="24" text-anchor="middle" class="heading">Files on disk</text>

  <!-- Row 1: 01_download_data.R → data_raw/raw_deaths.csv -->
  <rect x="50" y="40" width="240" height="34" class="script"/>
  <text x="170" y="62" text-anchor="middle" class="label-script">01_download_data.R</text>

  <line x1="290" y1="57" x2="370" y2="57" class="connector"/>

  <rect x="380" y="40" width="250" height="34" class="datafile"/>
  <text x="505" y="62" text-anchor="middle" class="label-data">data_raw/raw_deaths.csv</text>

  <!-- Arrow from data file down to next script -->
  <line x1="505" y1="74" x2="505" y2="118" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="505" y1="118" x2="290" y2="152" class="connector"/>

  <!-- Row 2: 02_clean_data.R → data/clean_deaths.RDS -->
  <rect x="50" y="135" width="240" height="34" class="script"/>
  <text x="170" y="157" text-anchor="middle" class="label-script">02_clean_data.R</text>

  <line x1="290" y1="152" x2="370" y2="152" class="connector"/>

  <rect x="380" y="135" width="250" height="34" class="datafile"/>
  <text x="505" y="157" text-anchor="middle" class="label-data">data/clean_deaths.RDS</text>

  <!-- Checkpoint annotation -->
  <text x="505" y="185" text-anchor="middle" class="checkpoint">⬆ checkpoint — skip if unchanged</text>

  <!-- Branch point: clean_deaths.RDS feeds two scripts -->
  <!-- Left branch to 03_fit_models.R -->
  <line x1="505" y1="169" x2="505" y2="210" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M505,210 L290,247" class="connector"/>

  <!-- Right branch to 04_descriptive_table.R -->
  <path d="M505,210 L505,247" class="connector" style="marker-end: url(#arrow)"/>

  <!-- Row 3a: 03_fit_models.R → output/model_fits.RDS -->
  <rect x="50" y="230" width="240" height="34" class="script"/>
  <text x="170" y="252" text-anchor="middle" class="label-script">03_fit_models.R</text>

  <!-- Row 3b: 04_descriptive_table.R → output/table1.csv -->
  <rect x="380" y="230" width="250" height="34" class="script"/>
  <text x="505" y="252" text-anchor="middle" class="label-script">04_descriptive_table.R</text>

  <!-- Reuse annotation -->
  <rect x="248" y="197" width="170" height="20" rx="4" fill="#fff" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="333" y="211" text-anchor="middle" class="checkpoint">reuse — one input, two scripts</text>

  <!-- 03 output arrow -->
  <line x1="170" y1="264" x2="170" y2="305" class="connector"/>

  <rect x="50" y="310" width="240" height="34" class="datafile"/>
  <text x="170" y="332" text-anchor="middle" class="label-data">output/model_fits.RDS</text>

  <!-- 04 output arrow -->
  <line x1="505" y1="264" x2="505" y2="305" class="connector"/>

  <rect x="380" y="310" width="250" height="34" class="datafile"/>
  <text x="505" y="332" text-anchor="middle" class="label-data">output/table1.csv</text>

  <!-- Row 4: 05_fig_trends.R reads model_fits.RDS -->
  <line x1="170" y1="344" x2="170" y2="385" class="connector"/>

  <rect x="50" y="390" width="240" height="34" class="script"/>
  <text x="170" y="412" text-anchor="middle" class="label-script">05_fig_trends.R</text>

  <line x1="170" y1="424" x2="170" y2="465" class="connector"/>

  <rect x="50" y="470" width="240" height="34" class="datafile"/>
  <text x="170" y="492" text-anchor="middle" class="label-data">plots/fig_trends.pdf</text>

  <!-- Monolithic anti-pattern in right column -->
  <rect x="380" y="390" width="250" height="118" rx="6" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="505" y="413" text-anchor="middle" font-size="11" fill="#7b1a1a" font-weight="bold">Anti-pattern:</text>
  <text x="505" y="432" text-anchor="middle" font-size="11" fill="#7b1a1a">One monolithic analysis.R</text>
  <text x="505" y="451" text-anchor="middle" font-size="10" fill="#999">(500+ lines, must rerun</text>
  <text x="505" y="466" text-anchor="middle" font-size="10" fill="#999">from the top every time,</text>
  <text x="505" y="481" text-anchor="middle" font-size="10" fill="#999">impossible to review</text>
  <text x="505" y="496" text-anchor="middle" font-size="10" fill="#999">a single step in isolation)</text>

  <!-- Legend -->
  <rect x="50" y="540" width="580" height="60" rx="6" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <rect x="70" y="555" width="20" height="14" class="script"/>
  <text x="96" y="566" font-size="10" fill="#555">R script</text>
  <rect x="180" y="555" width="20" height="14" class="datafile"/>
  <text x="206" y="566" font-size="10" fill="#555">File on disk</text>
  <line x1="310" y1="562" x2="340" y2="562" class="connector"/>
  <text x="348" y="566" font-size="10" fill="#555">Produces</text>
  <line x1="430" y1="562" x2="460" y2="562" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="468" y="566" font-size="10" fill="#555">Reads from</text>
  <text x="170" y="586" text-anchor="start" font-size="10" fill="#777">Each script reads its inputs, does one job, saves its outputs.</text>
</svg>
